<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucid – Hors ligne</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f7f8f8;
      color: #0f172a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #4f46e5;
    }

    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .highlight {
      background: #eef2ff;
      border-radius: 12px;
      padding: 1rem;
      margin: 1.25rem 0;
      color: #4338ca;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #4f46e5;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Lucid fonctionne hors ligne</h1>
    <p>Tu n'es pas connecté à internet, mais pas de panique !</p>
    <div class="highlight">
      ✅ Tes décisions sont sauvegardées localement dans ton navigateur et restent accessibles.
    </div>
    <p>Reconnecte-toi pour charger la dernière version de l'application.</p>
    <a href="/lucid/" class="btn">Réessayer</a>
  </div>
</body>
</html>
